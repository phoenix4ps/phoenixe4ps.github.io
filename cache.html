<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME - Loading</title>
    <style>
        body {
            background-color: #000000;
            color: #ffd700;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .phoenix-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: -1;
            animation: phoenix-pulse-glow 3s infinite ease-in-out;
        }

        @keyframes phoenix-pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(255, 69, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)); }
            100% { filter: drop-shadow(0 0 5px rgba(255, 69, 0, 0.5)); }
        }

        h1 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }

        #progress-container {
            width: 75%;
            max-width: 350px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid #333;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4500, #ffd700);
            box-shadow: 0 0 15px #ff4500;
            transition: width 0.4s ease;
        }

        #status {
            margin-top: 15px;
            font-size: 12px;
            color: #ffffff;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="phoenix-layer"></div>

    <h1>Phoenix Game</h1>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="status">Installing Cache: <span id="percentage">0%</span></div>

    <script>
        var appCache = window.applicationCache;
        appCache.onprogress = function(e) {
            if (e.lengthComputable) {
                var percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById('progress-bar').style.width = percent + '%';
                document.getElementById('percentage').innerHTML = percent + '%';
            }
        };
        appCache.oncached = function() {
            document.getElementById('status').innerHTML = "Success! Loading Host...";
            setTimeout(function(){ location.href = "index.html"; }, 1500);
        };
        appCache.onerror = function() {
            document.getElementById('status').innerHTML = "Error: Check connection.";
        };
    </script>
</body>
</html>
