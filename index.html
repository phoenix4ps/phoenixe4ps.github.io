<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME</title>
    
    <script src="psfree_lapse_shared.js"></script>
    <script src="psfree.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #cccccc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Isolated Phoenix layer for specific glowing effect */
        .phoenix-layer {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: -1; 
            animation: phoenix-pulse-glow 3s infinite ease-in-out;
        }

        @keyframes phoenix-pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 35px rgba(255, 140, 0, 0.9)); opacity: 1; }
            100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); opacity: 0.8; }
        }

        h1 {
            color: #ffffff;
            font-size: 18px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 11px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #jailbreak-btn {
            background-color: #005cf8;
            color: white;
            padding: 6px 25px;
            border: 1px solid #0046bc;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            z-index: 10;
        }

        #console-box {
            background-color: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            width: 90%; 
            max-width: 450px;
            height: 90px;
            padding: 10px;
            font-family: monospace;
            text-align: left;
            font-size: 11px;
            color: #aaa;
            z-index: 10;
            overflow-y: auto;
        }

        .log-entry { margin: 2px 0; }
    </style>
</head>
<body>

    <div class="phoenix-layer"></div>

    <h1>PHOENIX GAME</h1>
    <div class="subtitle">HOST 7.00 - 9.60</div>

    <button id="jailbreak-btn" onclick="startExploit()">Start Jailbreak</button>

    <div id="console-box">
        <div id="messages">Waiting for input...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
            const box = document.getElementById("console-box");
            box.scrollTop = box.scrollHeight;
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing PHOENIX GAME Host..."); 
            try {
                setTimeout(function() { run_psfree(); }, 500);
            } catch(e) {
                printMsg("Error: Script files missing.");
            }
        }
    </script>
</body>
</html>
