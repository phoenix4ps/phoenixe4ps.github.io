<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME</title>
    
    <script src="psfree_lapse_shared.js"></script>
    <script src="psfree.js"></script>

    <style>
        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000000;
            color: #cccccc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phoenix-layer {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1; 
            animation: phoenix-pulse-glow 2.5s infinite ease-in-out;
        }

        @keyframes phoenix-pulse-glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.6)); opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 69, 0, 1)); opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            100% { filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.6)); opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
        }

        h1 {
            color: #ffffff;
            font-size: 22px;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.8);
            z-index: 10;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 11px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            z-index: 10;
        }

        #jailbreak-btn {
            background-color: rgba(0, 92, 248, 0.1); 
            color: #005cf8;
            width: 75px; 
            height: 75px;
            border: 3px solid #005cf8; 
            border-radius: 50%; 
            font-size: 22px;   
            font-weight: bold;
            font-family: "Arial Black", sans-serif;
            cursor: pointer;
            margin-bottom: 25px;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 92, 248, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #jailbreak-btn:active {
            transform: scale(0.9);
            background-color: #005cf8;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 92, 248, 1);
        }

        #console-box {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 320px;
            height: 65px;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #00ffcc;
            z-index: 10;
            overflow-y: auto;
            border-radius: 12px;
        }

        .log-entry { margin: 2px 0; }
    </style>
</head>
<body>

    <div class="phoenix-layer"></div>

    <h1>PHOENIX GAME</h1>
    <div class="subtitle">HOST 7.00 - 9.60</div>

    <button id="jailbreak-btn" onclick="startExploit()">PS</button>

    <div id="console-box">
        <div id="messages">System Ready...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
            const box = document.getElementById("console-box");
            box.scrollTop = box.scrollHeight;
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing PHOENIX GAME..."); 
            try {
                setTimeout(function() { run_psfree(); }, 500);
            } catch(e) {
                printMsg("Error: Script missing.");
            }
        }
    </script>
</body>
</html>
