<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Host</title>
    <style>
        body {
            background-color: #1a1a1a;
            background-image: url('icon0.png');
            background-size: cover;
            color: #cccccc;
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Smaller Title */
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Smaller Button */
        #jailbreak-btn {
            background-color: #444444;
            color: white;
            padding: 10px 35px;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
        }

        #jailbreak-btn:hover {
            background-color: #555555;
        }

        /* Console styling */
        #console-box {
            background-color: rgba(15, 15, 15, 0.95);
            color: #cccccc;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            width: 85%;
            max-width: 420px;
            min-height: 250px;
            font-family: monospace;
            text-align: left;
            direction: ltr;
            font-size: 14px;
        }

        .log-entry { margin: 3px 0; }
    </style>
</head>
<body>

    <h1>PS4 Host</h1>

    <button id="jailbreak-btn" onclick="startExploit()">Start Jailbreak</button>

    <div id="console-box">
        <div id="messages">Waiting for input...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Starting Exploit..."); 
            setTimeout(() => { printMsg("Checking System..."); }, 1000);
            setTimeout(() => { printMsg("Triggering WebKit..."); }, 2500);
            setTimeout(() => { printMsg("Done!"); }, 4000);
        }
    </script>

</body>
</html>
