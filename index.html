<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS4 Host</title>
    <style>
        /* Base page setup */
        body {
            background-color: #000000;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            color: #cccccc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 5px; /* Keeps elements at the very top */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tiny header to match the image */
        h1 {
            color: white;
            font-size: 13px;
            margin: 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Compact button style */
        #jailbreak-btn {
            background-color: #005cf8; /* Blue color from your image */
            color: white;
            padding: 3px 12px;
            border: 1px solid #0046bc;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }

        /* Thin horizontal console box */
        #console-box {
            background-color: rgba(20, 20, 20, 0.8);
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            width: 100%; 
            height: 60px; /* Short height as seen in hosts */
            padding: 5px 10px;
            font-family: monospace;
            text-align: left;
            font-size: 10px;
            overflow: hidden;
        }

        .log-entry { margin: 1px 0; color: #999; }
        
        /* Credits text at the bottom */
        .credits {
            font-size: 9px;
            color: #555;
            margin-top: 4px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <h1>PS4IDEA HOST 7.00 - 9.60</h1>

    <button id="jailbreak-btn" onclick="startExploit()">Start Jailbreak</button>

    <div id="console-box">
        <div id="messages">Waiting for input...</div>
    </div>

    <div class="credits">
        THIS HOST BY PS4IDEA<br>
        SPECIAL THANKS Feyzee
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing Exploit..."); 
            setTimeout(() => { printMsg("Memory Setup OK."); }, 800);
            setTimeout(() => { printMsg("Jailbreak Success!"); }, 1800);
        }
    </script>

</body>
</html>
