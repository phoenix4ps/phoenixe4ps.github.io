<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME</title>
    <style>
        body {
            background-color: #000000;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            color: #cccccc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Main Title */
        h1 {
            color: white;
            font-size: 18px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Subtitle */
        .subtitle {
            color: #888;
            font-size: 11px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        /* Jailbreak Button */
        #jailbreak-btn {
            background-color: #005cf8;
            color: white;
            padding: 4px 18px;
            border: 1px solid #0046bc;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #jailbreak-btn:hover {
            background-color: #0046bc;
        }

        /* Status Box */
        #console-box {
            background-color: rgba(20, 20, 20, 0.85);
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            width: 100%; 
            height: 70px;
            padding: 5px 10px;
            font-family: monospace;
            text-align: left;
            font-size: 10px;
            overflow: hidden;
        }

        .log-entry { margin: 1px 0; color: #999; }
    </style>
</head>
<body>

    <h1>PHOENIX GAME</h1>
    <div class="subtitle">HOST 7.00 - 9.60</div>

    <button id="jailbreak-btn" onclick="startExploit()">Start Jailbreak</button>

    <div id="console-box">
        <div id="messages">Waiting for input...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing PHOENIX GAME Host..."); 
            setTimeout(() => { printMsg("Looking for exploit..."); }, 800);
            setTimeout(() => { printMsg("Jailbreak Ready!"); }, 1800);
        }
    </script>

</body>
</html>
