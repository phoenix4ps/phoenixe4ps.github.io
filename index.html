<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME</title>
    
    <script src="psfree_lapse_shared.js"></script>
    <script src="psfree.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        body {
            /* Full background fix */
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            font-family: Arial, sans-serif;
        }

        .phoenix-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            /* This line removes the black square background */
            mix-blend-mode: screen; 
            animation: phoenix-pulse-glow 2.5s infinite ease-in-out;
        }

        @keyframes phoenix-pulse-glow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.5)); opacity: 0.9; }
            50% { filter: drop-shadow(0 0 40px rgba(255, 69, 0, 1)); opacity: 1; }
            100% { filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.5)); opacity: 0.9; }
        }

        h1 {
            color: #ffffff;
            font-size: 22px;
            margin: 10px 0 2px 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.8);
            z-index: 10;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 10px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            z-index: 10;
        }

        #jailbreak-btn {
            background-color: rgba(0, 92, 248, 0.1); 
            color: #005cf8;
            width: 65px; 
            height: 65px;
            border: 2px solid #005cf8; 
            border-radius: 50%; 
            font-size: 18px;   
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(0, 92, 248, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #jailbreak-btn:active {
            transform: scale(0.9);
            background-color: #005cf8;
            color: #fff;
        }

        #console-box {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 320px;
            height: 60px;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #00ffcc;
            z-index: 10;
            border-radius: 10px;
            position: absolute;
            bottom: 30px;
        }

        .log-entry { margin: 2px 0; }
    </style>
</head>
<body>

    <div class="phoenix-layer"></div>

    <h1>PHOENIX GAME</h1>
    <div class="subtitle">HOST 7.00 - 9.60</div>

    <button id="jailbreak-btn" onclick="startExploit()">PS</button>

    <div id="console-box">
        <div id="messages">System Ready...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
            const box = document.getElementById("console-box");
            box.scrollTop = box.scrollHeight;
        }

        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing..."); 
            try {
                setTimeout(function() { run_psfree(); }, 500);
            } catch(e) {
                printMsg("Error!");
            }
        }
    </script>
</body>
</html>
