<!DOCTYPE html>
<html lang="en" manifest="psfree_lapse.cache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX GAME</title>
    
    <script src="psfree_lapse_shared.js"></script>
    <script src="psfree.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        body {
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #ffffff;
            font-size: 18px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.8);
            z-index: 10;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 10px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            z-index: 10;
        }

        #jailbreak-btn {
            background-color: rgba(0, 92, 248, 0.15); 
            color: #005cf8;
            width: 55px; 
            height: 55px;
            border: 2px solid #005cf8; 
            border-radius: 50%; 
            font-size: 16px;   
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 92, 248, 0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .phoenix-container {
            width: 190px; 
            height: 190px;
            z-index: 1;
            mix-blend-mode: screen; 
            animation: pulse-glow-only 2.5s infinite ease-in-out;
            margin-top: 10px;
        }

        .phoenix-layer {
            width: 100%;
            height: 100%;
            background-image: url('icon0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        @keyframes pulse-glow-only {
            0% { filter: drop-shadow(0 0 10px rgba(255, 69, 0, 0.6)); }
            50% { filter: drop-shadow(0 0 35px rgba(255, 69, 0, 0.9)); }
            100% { filter: drop-shadow(0 0 10px rgba(255, 69, 0, 0.6)); }
        }

        .side-wrapper {
            position: fixed;
            top: 215px; 
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .left-side { left: 8%; }
        .right-side { right: 8%; }

        .ps-icon-side {
            width: 32px;
            height: 32px;
        }

        .tri { filter: drop-shadow(0 0 12px #4caf50); } 
        .squ { filter: drop-shadow(0 0 12px #e91e63); } 
        .cir { filter: drop-shadow(0 0 12px #ff5722); } 
        .cro { filter: drop-shadow(0 0 12px #2196f3); } 

        .writing-layer {
            margin-top: -20px; 
            width: 240px;
            height: auto;
            object-fit: contain;
            z-index: 10;
            filter: drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #ff8c00);
        }

        #console-box {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 320px;
            height: 80px;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #00ffcc;
            z-index: 10;
            border-radius: 10px;
            margin-top: 10px; 
            overflow-y: auto;
            position: relative; 
        }
    </style>
</head>
<body>

    <h1>PHOENIX HOST</h1>
    <div class="subtitle">7.00 - 9.60</div>

    <button id="jailbreak-btn" onclick="startExploit()">PS</button>

    <div class="phoenix-container">
        <div class="phoenix-layer"></div>
    </div>

    <div class="side-wrapper left-side">
        <img src="tri.png" class="ps-icon-side tri">
        <img src="squ.png" class="ps-icon-side squ">
    </div>
    <div class="side-wrapper right-side">
        <img src="cir.png" class="ps-icon-side cir">
        <img src="cro.png" class="ps-icon-side cro">
    </div>

    <img src="wri.png" class="writing-layer">

    <div id="console-box">
        <div id="messages">System Ready...</div>
    </div>

    <script>
        function printMsg(text) {
            const msgDiv = document.getElementById("messages");
            msgDiv.innerHTML += "<div class='log-entry'>> " + text + "</div>";
            const box = document.getElementById("console-box");
            box.scrollTop = box.scrollHeight;
        }
        function startExploit() {
            document.getElementById("messages").innerHTML = ""; 
            printMsg("Initializing..."); 
            try {
                setTimeout(function() { run_psfree(); }, 500);
            } catch(e) { printMsg("Error!"); }
        }
    </script>
</body>
</html>
